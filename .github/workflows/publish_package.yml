name: Publish Python package

on:
  push:
    branches:
      - test_workflow

jobs:
  build_arm_wheels:
    name: Build CPython wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 500

    strategy:
      matrix:
        os: [ubuntu-latest]
        cibw_build:
          - "cp311-*"
          - "cp312-*"
          - "cp313-*"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel==3.0.1
          # python -m pip install "setuptools>=64" wheel pybind11 cibuildwheel

      # - name: Install dependencies from pyproject.toml
      #   run: |
      #     python -m pip install . -vvv

      - name: Set up QEMU for cross-building (Linux only)
        run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Build wheels
        env:
          INSTALL_ENDF_PARSERPY_CPP: yes
          INSTALL_ENDF_PARSERPY_CPP_OPTIM: 0
          CIBW_ARCHS_LINUX: "aarch64"
          # CIBW_ARCHS_LINUX: "aarch64 armv7l"
          CIBW_BUILD: "${{ matrix.cibw_build }}"
          CIBW_BUILD_VERBOSITY: 3
          # CIBW_BEFORE_BUILD: "pip install pybind11"
        run: |
          echo ">>>> ENV IN RUN - INSTALL_ENDF_PARSERPY_CPP: $INSTALL_ENDF_PARSERPY_CPP"
          echo ">>>> ENV IN RUN - INSTALL_ENDF_PARSERPY_CPP_OPTIM: $INSTALL_ENDF_PARSERPY_CPP_OPTIM"
          sed -i "s/cibuildwheel_hack *= *False/cibuildwheel_hack=True/" setup.py
          sed -i "s/__INSTALL_ENDF_PARSERPY_CPP__/$INSTALL_ENDF_PARSERPY_CPP/" setup.py
          sed -i "s/__INSTALL_ENDF_PARSERPY_CPP_OPTIM__/$INSTALL_ENDF_PARSERPY_CPP_OPTIM/" setup.py
          python -m cibuildwheel --output-dir wheelhouse

      - name: Show built wheels
        run: ls -lh wheelhouse/

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-cpython-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

